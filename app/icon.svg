<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <rect width="32" height="32" rx="6" fill="#0c2340"/>
  <!-- Building/crane icon -->
  <rect x="6" y="14" width="8" height="12" rx="1" fill="#f97316"/>
  <rect x="8" y="16" width="1.5" height="2" rx="0.3" fill="#0c2340"/>
  <rect x="11" y="16" width="1.5" height="2" rx="0.3" fill="#0c2340"/>
  <rect x="8" y="20" width="1.5" height="2" rx="0.3" fill="#0c2340"/>
  <rect x="11" y="20" width="1.5" height="2" rx="0.3" fill="#0c2340"/>
  <!-- Taller building -->
  <rect x="16" y="8" width="7" height="18" rx="1" fill="#f97316" opacity="0.8"/>
  <rect x="18" y="10" width="1.2" height="1.5" rx="0.2" fill="#0c2340"/>
  <rect x="20.5" y="10" width="1.2" height="1.5" rx="0.2" fill="#0c2340"/>
  <rect x="18" y="13" width="1.2" height="1.5" rx="0.2" fill="#0c2340"/>
  <rect x="20.5" y="13" width="1.2" height="1.5" rx="0.2" fill="#0c2340"/>
  <rect x="18" y="16" width="1.2" height="1.5" rx="0.2" fill="#0c2340"/>
  <rect x="20.5" y="16" width="1.2" height="1.5" rx="0.2" fill="#0c2340"/>
  <rect x="18" y="19" width="1.2" height="1.5" rx="0.2" fill="#0c2340"/>
  <rect x="20.5" y="19" width="1.2" height="1.5" rx="0.2" fill="#0c2340"/>
  <!-- Crane arm -->
  <line x1="25" y1="8" x2="25" y2="4" stroke="#f97316" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="25" y1="4" x2="18" y2="4" stroke="#f97316" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="19" y1="4" x2="19" y2="7" stroke="#f97316" stroke-width="0.8" stroke-linecap="round"/>
  <!-- Ground line -->
  <rect x="4" y="26" width="24" height="1.5" rx="0.75" fill="white" opacity="0.4"/>
</svg>
